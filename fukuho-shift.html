<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>福宝シフト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red: #C8202E;
    --red-dark: #8E1620;
    --red-soft: #FBEAEA;
    --red-softer: #FDF5F5;
    --white: #FFFFFF;
    --ink: #2B2320;
    --ink-soft: #7A6F68;
    --gold: #C9A227;
    --line: #EBE1DB;
    --night: #2A2E45;
    --night-soft: #EEF0F8;
    --others: #F3EDE8;
    --shadow: 0 2px 10px rgba(43,35,32,0.06);
    --shadow-lg: 0 8px 28px rgba(43,35,32,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; height:100%; overscroll-behavior:none; overflow-x:hidden;}
  body{
    font-family:'Noto Sans JP', sans-serif;
    background:var(--red-softer);
    color:var(--ink);
    height:100vh;
    height:100dvh;
    overflow:hidden;
    -webkit-tap-highlight-color: transparent;
  }
  #app{
    max-width:480px; margin:0 auto; height:100vh; height:100dvh; background:var(--white);
    display:flex; flex-direction:column; box-shadow:var(--shadow-lg); position:relative; overflow:hidden;
  }
  .main-scroll{ flex:1; min-height:0; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; display:flex; flex-direction:column; }
  .app-header{ flex-shrink:0; }
  .finalize-bar{ flex-shrink:0; }
  .login-wrap{ overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }

  @media (max-width: 400px){
    .cal-grid{ gap:6px; padding:8px 10px 16px; }
    .app-header{ padding:13px 14px 12px; }
    .app-header h1{ font-size:17px; }
    .stamp-mark{ width:32px; height:32px; font-size:15px; }
    .user-chip .name{ max-width:60px; font-size:11px; }
    .back-btn{ padding:5px 8px; font-size:10px; }
    .section-label{ padding:12px 12px 6px; font-size:11px; }
    .month-bar{ padding:12px 12px 6px; gap:6px; }
    .month-btn{ font-size:12.5px; padding:10px 0; }
    .day-cell .num{ font-size:13px; }
    .mini-badge{ font-size:7px; }
  }

  /* ---------- Header ---------- */
  .app-header{
    background: var(--red);
    color:var(--white);
    padding:16px 18px 14px;
    display:flex; align-items:center; gap:12px;
    position:sticky; top:0; z-index:20;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }
  .stamp-mark{
    width:38px; height:38px; border-radius:50%;
    border:2.5px solid var(--white);
    display:flex; align-items:center; justify-content:center;
    font-family:'Zen Maru Gothic', sans-serif; font-weight:900; font-size:18px;
    flex-shrink:0;
    transform:rotate(-6deg);
  }
  .app-header h1{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900; font-size:20px; letter-spacing:.03em; margin:0; flex:1;
  }
  .user-chip{ display:flex; align-items:center; gap:8px; font-size:12px; }
  .user-chip .name{ font-weight:700; max-width:96px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .user-chip .role-badge{
    background:rgba(255,255,255,0.22); border-radius:20px; padding:2px 9px; font-size:11px; font-weight:700;
  }
  .back-btn{
    background:none; border:1px solid rgba(255,255,255,0.55); color:var(--white);
    border-radius:20px; padding:5px 11px; font-size:11px; font-family:inherit; cursor:pointer;
    display:flex; align-items:center; gap:3px;
  }
  .back-btn:active{ background:rgba(255,255,255,0.2); }

  /* ---------- Login ---------- */
  .login-wrap{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; background:
    radial-gradient(circle at 20% 15%, var(--red-soft), transparent 45%),
    radial-gradient(circle at 85% 80%, var(--red-soft), transparent 40%),
    var(--white);
  }
  .login-logo{
    width:88px;height:88px;border-radius:50%;
    background:var(--red); color:var(--white);
    display:flex;align-items:center;justify-content:center;
    font-family:'Zen Maru Gothic',sans-serif; font-weight:900; font-size:40px;
    box-shadow: var(--shadow-lg);
    margin-bottom:16px;
    border:3px solid var(--white);
    outline:2px solid var(--red);
  }
  .login-title{ font-family:'Zen Maru Gothic',sans-serif; font-weight:900; font-size:26px; margin:0 0 2px; letter-spacing:.04em;}
  .login-sub{ color:var(--ink-soft); font-size:13px; margin:0 0 28px;}
  .role-toggle{ display:flex; width:100%; max-width:320px; background:var(--red-soft); border-radius:14px; padding:4px; margin-bottom:20px; }
  .role-toggle button{
    flex:1; border:none; background:none; padding:11px 0; font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:14px;
    color:var(--red-dark); border-radius:11px; cursor:pointer; transition:.15s;
  }
  .role-toggle button.active{ background:var(--red); color:var(--white); box-shadow:var(--shadow); }
  .login-card{ width:100%; max-width:320px; }
  .field-label{ font-size:12px; font-weight:700; color:var(--ink-soft); margin:0 0 6px; display:block;}
  .text-input{
    width:100%; padding:13px 14px; border:1.5px solid var(--line); border-radius:12px;
    font-family:inherit; font-size:15px; background:var(--white); color:var(--ink); margin-bottom:14px;
  }
  .text-input:focus{ outline:none; border-color:var(--red); }
  .primary-btn{
    width:100%; padding:14px; border:none; border-radius:12px; background:var(--red); color:var(--white);
    font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:15px; cursor:pointer; letter-spacing:.02em;
    box-shadow: 0 4px 12px rgba(200,32,46,0.28);
  }
  .primary-btn:active{ background:var(--red-dark); }
  .hint-text{ font-size:11.5px; color:var(--ink-soft); margin-top:10px; text-align:center; line-height:1.6;}
  .error-text{ color:var(--red); font-size:12.5px; margin:-8px 0 12px; font-weight:700; }
  .pw-field-wrap{ position:relative; margin-bottom:14px; }
  .pw-field-wrap .text-input{ margin-bottom:0; padding-right:46px; }
  .pw-toggle-btn{
    position:absolute; right:4px; top:0; bottom:0; margin:auto 0; height:32px; width:34px;
    background:none; border:none; cursor:pointer; padding:0;
    display:flex; align-items:center; justify-content:center; color:var(--ink-soft);
  }
  .pw-toggle-btn:active{ color:var(--ink); }
  .link-btn{ display:block; width:100%; text-align:center; background:none; border:none; color:var(--red-dark); font-size:12.5px; font-weight:700; padding:10px 0 0; cursor:pointer; text-decoration:underline; }

  /* ---------- Month selector ---------- */
  .month-bar{ display:flex; gap:8px; padding:14px 16px 6px; }
  .month-btn{
    flex:1; padding:11px 0; border-radius:12px; border:1.5px solid var(--line); background:var(--white);
    font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:14px; color:var(--ink-soft); cursor:pointer;
  }
  .month-btn.active{ background:var(--red); border-color:var(--red); color:var(--white); }
  .month-settings-row{ padding:2px 16px 0; text-align:left; }
  .month-settings-row .link-btn{ text-align:left; padding:4px 0; text-decoration:none; }
  .utility-row{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .utility-row .link-btn{ width:auto; flex-shrink:0; }

  /* ---------- Today card ---------- */
  .today-card{
    margin:14px 16px 0; padding:13px 14px; border-radius:14px; background:var(--red-softer);
    border:1.5px solid var(--red-soft); cursor:pointer; position:relative;
  }
  .today-card:active{ background:var(--red-soft); }
  .today-card-title{
    display:flex; align-items:center; gap:6px; font-family:'Zen Maru Gothic',sans-serif; font-weight:900; font-size:13px; color:var(--red-dark); margin-bottom:8px;
  }
  .today-card-title .badge{ background:var(--red); color:var(--white); border-radius:8px; padding:1px 8px; font-size:11px; }
  .today-card-row{ display:flex; gap:8px; font-size:12px; align-items:flex-start; margin-bottom:4px; }
  .today-card-row:last-child{ margin-bottom:0; }
  .today-card-row .lbl{ font-weight:700; flex-shrink:0; min-width:44px; }
  .today-card-row.day-r .lbl{ color:var(--red-dark); }
  .today-card-row.night-r .lbl{ color:var(--night); }
  .today-card-row .names{ color:var(--ink-soft); line-height:1.5; }
  .today-card-empty{ font-size:12px; color:var(--ink-soft); }
  .today-card-hint{ position:absolute; top:12px; right:14px; font-size:10px; color:var(--ink-soft); }

  /* ---------- Small delete-all button after calendar ---------- */
  .delete-all-wrap{ text-align:center; padding:0 16px 4px; }
  .danger-btn-small{
    display:inline-block; padding:6px 14px; border-radius:20px; border:1.2px solid var(--red); background:var(--white);
    color:var(--red); font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:11px; cursor:pointer;
  }
  .danger-btn-small:active{ background:var(--red-soft); }

  /* ---------- Tabs ---------- */
  .tab-bar{ display:flex; padding:6px 16px 0; gap:6px; border-bottom:1.5px solid var(--line); }
  .tab-btn{
    flex:1; padding:11px 0 12px; border:none; background:none; font-family:'Zen Maru Gothic',sans-serif; font-weight:700;
    font-size:14px; color:var(--ink-soft); border-bottom:3px solid transparent; margin-bottom:-1.5px; cursor:pointer;
  }
  .tab-btn.active{ color:var(--red); border-bottom-color:var(--red); }

  .section-label{ font-size:12px; font-weight:700; color:var(--ink-soft); padding:14px 18px 6px; letter-spacing:.03em;}

  .danger-btn{
    display:block; width:calc(100% - 32px); margin:6px 16px 0; padding:10px; border-radius:10px; border:1.5px solid var(--red); background:var(--white);
    color:var(--red); font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:12.5px; cursor:pointer;
  }
  .danger-btn:active{ background:var(--red-soft); }

  /* ---------- Calendar grid (stamp card) ---------- */
  .cal-grid{
    display:grid; grid-template-columns:repeat(7, minmax(0,1fr)); grid-auto-rows:1fr;
    gap:8px; padding:8px 16px 20px; flex:1; min-height:0;
  }
  .day-cell{
    min-width:0; min-height:44px; border-radius:14px; border:1.5px solid var(--line); background:var(--white);
    display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;
    position:relative; transition:.12s; -webkit-tap-highlight-color:transparent; padding:2px; overflow:hidden;
  }
  .day-cell:active{ transform:scale(0.94); }
  .day-cell .num{ font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:15px; color:var(--ink); }
  .day-cell .mark{ font-size:10px; margin-top:1px; line-height:1;}
  .day-cell.has-day{ background:var(--red-soft); border-color:var(--red); }
  .day-cell.has-day .num{ color:var(--red-dark); }
  .day-cell.has-night{ background:var(--night-soft); border-color:var(--night); }
  .day-cell.has-night .num{ color:var(--night); }
  .day-cell.others-only{ background:var(--others); border-color:var(--line); }
  .day-cell.others-only .num{ color:var(--ink-soft); }
  .day-cell .comment-dot{
    position:absolute; top:5px; right:6px; width:6px; height:6px; border-radius:50%; background:var(--gold);
  }
  .day-cell.stamped{ background:var(--red); border-color:var(--red); }
  .day-cell.stamped .num, .day-cell.stamped .mark{ color:var(--white); }
  .day-cell.stamped-night{ background:var(--night); border-color:var(--night); }
  .day-cell.stamped-night .num, .day-cell.stamped-night .mark{ color:var(--white); }
  .day-cell.stamped-both{ background:linear-gradient(135deg, var(--red) 50%, var(--night) 50%); border-color:var(--ink); }
  .day-cell.stamped-both .num, .day-cell.stamped-both .mark{ color:var(--white); }
  .day-cell.filled-full{ box-shadow: inset 0 0 0 2px var(--gold); }
  .day-cell.empty-day .num{ color:#C9BEB8; }
  .mini-badge{ font-size:8px; line-height:1.3; margin-top:1px; font-weight:700; text-align:center; display:flex; flex-direction:column; gap:0; width:100%; overflow:hidden; }
  .mini-badge span{ white-space:nowrap; overflow:hidden; text-overflow:clip; }
  .mini-badge .b-day{ color:var(--red-dark); }
  .mini-badge .b-night{ color:var(--night); }

  .empty-msg{ flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:var(--ink-soft); font-size:13px; padding:40px 24px; line-height:1.8; }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(43,35,32,0.45); display:flex; align-items:flex-end; justify-content:center;
    z-index:100; opacity:0; pointer-events:none; transition:opacity .18s;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .modal-sheet{
    background:var(--white); width:100%; max-width:520px; border-radius:20px 20px 0 0; padding:20px 20px 24px;
    max-height:84vh; overflow-y:auto; transform:translateY(16px); transition:transform .18s;
    box-shadow: 0 -8px 30px rgba(0,0,0,0.2);
  }
  .overlay.show .modal-sheet{ transform:translateY(0); }
  .modal-handle{ width:36px; height:4px; border-radius:3px; background:var(--line); margin:0 auto 14px; }
  .modal-title{ font-family:'Zen Maru Gothic',sans-serif; font-weight:900; font-size:18px; margin:0 0 4px; }
  .modal-sub{ font-size:12px; color:var(--ink-soft); margin:0 0 16px; }

  .shift-toggle-row{ display:flex; gap:10px; margin-bottom:16px; }
  .shift-toggle{
    flex:1; padding:16px 0; border-radius:14px; border:1.5px solid var(--line); background:var(--white);
    font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:15px; color:var(--ink); cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .shift-toggle .ico{ font-size:22px; }
  .shift-toggle.sel-day{ background:var(--red); border-color:var(--red); color:var(--white); }
  .shift-toggle.sel-night{ background:var(--night); border-color:var(--night); color:var(--white); }

  textarea.text-input{ resize:vertical; min-height:72px; font-family:inherit; }

  .shift-section{ margin-bottom:14px; padding:14px; border-radius:14px; border:1.5px solid var(--line); }
  .shift-section.day-sec{ background:var(--red-softer); }
  .shift-section.night-sec{ background:var(--night-soft); }
  .shift-section-title{ display:flex; align-items:center; gap:6px; font-family:'Zen Maru Gothic',sans-serif; font-weight:900; font-size:14.5px; margin-bottom:10px; }
  .shift-section-title.day-t{ color:var(--red-dark); }
  .shift-section-title.night-t{ color:var(--night); }

  .req-count-row{ display:flex; align-items:center; justify-content:center; gap:16px; margin:2px 0 4px; }
  .count-btn{
    width:36px; height:36px; border-radius:50%; border:1.5px solid var(--red); background:var(--white); color:var(--red);
    font-size:18px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .count-btn:active{ background:var(--red-soft); }
  .req-count-num{ font-family:'Zen Maru Gothic',sans-serif; font-weight:900; font-size:20px; min-width:56px; text-align:center;}
  .req-count-label{ font-size:10.5px; color:var(--ink-soft); text-align:center; margin-bottom:10px;}

  .applicant-row{
    display:flex; align-items:center; gap:10px; padding:10px; border:1.5px solid var(--line); border-radius:12px; margin-bottom:7px; background:var(--white);
  }
  .applicant-row.checked{ border-color:var(--red); background:var(--red-softer); }
  .applicant-check{ width:22px; height:22px; border-radius:50%; border:2px solid var(--line); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--white); }
  .applicant-row.checked .applicant-check{ background:var(--red); border-color:var(--red); }
  .applicant-info{ flex:1; min-width:0; }
  .applicant-name{ font-weight:700; font-size:14px; }
  .applicant-comment{ font-size:11.5px; color:var(--ink-soft); margin-top:3px; }
  .no-applicant{ font-size:12px; color:var(--ink-soft); padding:6px 2px; }

  .roster-list{ margin-bottom:2px; }
  .roster-row{ padding:9px 12px; border:1.5px solid var(--line); border-radius:10px; margin-bottom:6px; font-size:13.5px; font-weight:700; }
  .roster-row.you{ border-color:var(--red); background:var(--red-softer); color:var(--red-dark); }

  .modal-actions{ display:flex; gap:10px; margin-top:8px; }
  .modal-actions .primary-btn{ flex:1; }
  .ghost-btn{
    flex:1; padding:14px; border-radius:12px; border:1.5px solid var(--line); background:var(--white); color:var(--ink-soft);
    font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:14px; cursor:pointer;
  }

  /* ---------- Legend / footer ---------- */
  .legend{ display:flex; gap:12px; padding:0 18px 8px; font-size:10.5px; color:var(--ink-soft); flex-wrap:wrap; }
  .legend span{ display:flex; align-items:center; gap:5px; }
  .legend .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; }

  .finalize-bar{
    position:sticky; bottom:0; background:var(--white); border-top:1.5px solid var(--line);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom)); z-index:15;
  }
  .finalize-bar .primary-btn{ box-shadow: 0 -2px 10px rgba(200,32,46,0.15), 0 4px 12px rgba(200,32,46,0.28); }
  .status-line{ font-size:11.5px; color:var(--ink-soft); text-align:center; margin:0 0 8px; }
  .status-line b{ color:var(--red); }

  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--white);
    padding:11px 20px; border-radius:24px; font-size:13px; font-weight:700; z-index:200; opacity:0; transition:.2s; pointer-events:none;
    box-shadow:var(--shadow-lg);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .loading-wrap{ flex:1; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); font-size:13px; padding:60px;}
</style>
</head>
<body>
<div id="app"><div class="loading-wrap">読み込み中…</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAnalytics, isSupported as analyticsIsSupported } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

/* =====================================================================
   ① Firebaseプロジェクトの設定値(福宝シフト用)
===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyAHjKI1UDTgtQHzfqXpr6M2avUuAjXcxnw",
  authDomain: "fubao-16295.firebaseapp.com",
  projectId: "fubao-16295",
  storageBucket: "fubao-16295.firebasestorage.app",
  messagingSenderId: "360547489720",
  appId: "1:360547489720:web:9c29d2abe89a296f78e14d",
  measurementId: "G-FN02XZG75T"
};

const isConfigured = firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY";
let db = null;
if(isConfigured){
  const fbApp = initializeApp(firebaseConfig);
  db = getFirestore(fbApp);
  // アクセス解析(任意・失敗しても致命的ではないので握りつぶす)
  analyticsIsSupported().then(ok=>{ if(ok){ try{ getAnalytics(fbApp); }catch(e){} } }).catch(()=>{});
}

(function(){
  "use strict";

  if(!isConfigured){
    document.getElementById('app').innerHTML =
      '<div style="padding:40px 24px;font-family:sans-serif;line-height:1.8;color:#2B2320;">' +
      '<h2 style="color:#C8202E;">⚠️ Firebaseの設定が必要です</h2>' +
      '<p>コード上部の <code>firebaseConfig</code> に、あなたのFirebaseプロジェクトの設定値を貼り付けてください。手順はチャットの説明を確認してください。</p>' +
      '</div>';
    throw new Error('Firebase is not configured yet');
  }

  /* ===================== Storage helpers (Firestore) =====================
     コレクション構成:
       requests/{年-月}  … その月の全シフト希望 { "1":{"山田":{day,night,comment}}, ... }
       drafts/{年-月}    … 管理者が選出中のデータ(未確定)
       finals/{年-月}    … 確定済みシフト(存在すれば確定済み)
       meta/staffAuth    … { 名前: パスワード }
       meta/settings     … { baseMonth: {year,month} | null }
  ========================================================================== */
  function wait(ms){ return new Promise(res=>setTimeout(res, ms)); }

  async function fsGet(col, id, attempt){
    attempt = attempt || 1;
    try{
      const snap = await getDoc(doc(db, col, id));
      return snap.exists() ? snap.data() : null;
    }catch(e){
      if(attempt < 3){ await wait(250); return fsGet(col, id, attempt+1); }
      console.error('firestore get failed', col, id, e);
      return null;
    }
  }
  async function fsSet(col, id, value, attempt){
    attempt = attempt || 1;
    try{
      await setDoc(doc(db, col, id), value);
      return true;
    }catch(e){
      if(attempt < 3){ await wait(250); return fsSet(col, id, value, attempt+1); }
      console.error('firestore set failed', col, id, e);
      return false;
    }
  }

  // 互換用ラッパー(旧 storeGet/storeSet と同じ呼び方ができるように)
  function keyToRef(key){
    if(key === 'staff-auth') return ['meta', 'staffAuth'];
    if(key === 'settings-baseMonth') return ['meta', 'settings'];
    if(key.startsWith('requests-')) return ['requests', key.slice('requests-'.length)];
    if(key.startsWith('draft-')) return ['drafts', key.slice('draft-'.length)];
    if(key.startsWith('final-')) return ['finals', key.slice('final-'.length)];
    return ['misc', key];
  }
  async function storeGet(key){
    const [col, id] = keyToRef(key);
    const data = await fsGet(col, id);
    if(data === null) return null;
    // settings-baseMonth はそのまま保存された値そのものを返す
    if(key === 'settings-baseMonth') return (data && 'value' in data) ? data.value : null;
    return data;
  }
  async function storeSet(key, value){
    const [col, id] = keyToRef(key);
    if(key === 'settings-baseMonth') return await fsSet(col, id, { value: value });
    return await fsSet(col, id, value || {});
  }

  /* ===================== Realtime subscriptions =====================
     現在表示中の月について、他の端末での変更をリアルタイムで反映します。
  ==================================================================== */
  let activeUnsubs = [];
  function clearSubscriptions(){
    activeUnsubs.forEach(u=>{ try{ u(); }catch(e){} });
    activeUnsubs = [];
  }
  function subscribeToMonth(year, month){
    clearSubscriptions();
    const mk = monthKey(year, month);
    const targets = [
      ['requests', mk, 'requestsCache'],
      ['drafts', mk, 'draftCache'],
      ['finals', mk, 'finalCache']
    ];
    targets.forEach(([col, id, cacheKey])=>{
      const unsub = onSnapshot(doc(db, col, id), (snap)=>{
        const data = snap.exists() ? snap.data() : (cacheKey === 'finalCache' ? null : {});
        state[cacheKey][mk] = data;
        const modalRoot = document.getElementById('modalRoot');
        if(modalRoot && modalRoot.innerHTML.trim() !== '') return; // 入力中は邪魔しない
        if(!state.user) return;
        if(state.user.role === 'staff') renderStaff(); else renderAdmin();
      }, (err)=>{ console.error('onSnapshot error', col, id, err); });
      activeUnsubs.push(unsub);
    });
  }

  /* ===================== Date helpers ===================== */
  function baseDate(){
    if(state.baseMonthOverride){
      return new Date(state.baseMonthOverride.year, state.baseMonthOverride.month - 1, 1);
    }
    const now = new Date();
    return new Date(now.getFullYear(), now.getMonth(), 1);
  }
  function monthInfo(offset){
    const b = baseDate();
    const d = new Date(b.getFullYear(), b.getMonth() + offset, 1);
    const year = d.getFullYear();
    const month = d.getMonth() + 1;
    const daysInMonth = new Date(year, month, 0).getDate();
    return { year, month, daysInMonth };
  }
  function monthKey(year, month){ return year + "-" + String(month).padStart(2,"0"); }
  function todayInfo(){
    const t = new Date();
    return { year: t.getFullYear(), month: t.getMonth() + 1, day: t.getDate() };
  }

  /* ===================== Global state ===================== */
  const state = {
    user: null,
    monthOffset: 0,
    staffTab: 'request',
    requestsCache: {},
    draftCache: {},
    finalCache: {},
    baseMonthOverride: null,
    loading: false,
    loginRole: 'staff',
    loginStep: 'name',      // 'name' | 'password'
    pendingStaffName: '',
    isNewStaff: false,
    loginError: '',
    showChangePassword: false,
    loginFailCounts: {},   // name -> consecutive wrong-password count
    loginLockUntil: {}     // name -> timestamp (ms) until which login is locked
  };

  const app = document.getElementById('app');
  const ICON_EYE = '<svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  const ICON_EYE_OFF = '<svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="3" y1="20" x2="21" y2="4"/></svg>';

  function toast(msg){
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(()=> t.classList.add('show'));
    setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(), 250); }, 1800);
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function bindPasswordToggles(){
    document.querySelectorAll('.pw-toggle-btn').forEach(btn=>{
      btn.onclick = ()=>{
        const inp = document.getElementById(btn.dataset.target);
        if(!inp) return;
        if(inp.type === 'password'){ inp.type = 'text'; btn.innerHTML = ICON_EYE_OFF; }
        else { inp.type = 'password'; btn.innerHTML = ICON_EYE; }
      };
    });
  }

  /* ===================== Data access with cache ===================== */
  async function ensureMonthData(year, month){
    const mk = monthKey(year, month);
    const [req, draft, final] = await Promise.all([
      storeGet('requests-' + mk),
      storeGet('draft-' + mk),
      storeGet('final-' + mk)
    ]);
    state.requestsCache[mk] = req || {};
    state.draftCache[mk] = draft || {};
    state.finalCache[mk] = final || null;
  }

  async function ensureFinalOnly(year, month, force){
    const mk = monthKey(year, month);
    if(force || !(mk in state.finalCache)){
      const f = await storeGet('final-' + mk);
      state.finalCache[mk] = f || null;
    }
  }

  async function saveRequestDay(mk, day, name, entry){
    const data = state.requestsCache[mk] || {};
    if(entry === null){
      if(data[day]) delete data[day][name];
      if(data[day] && Object.keys(data[day]).length === 0) delete data[day];
    } else {
      data[day] = data[day] || {};
      data[day][name] = entry;
    }
    state.requestsCache[mk] = data;
    await storeSet('requests-' + mk, data);
  }

  async function deleteAllRequestsForUser(mk, name){
    const data = state.requestsCache[mk] || {};
    Object.keys(data).forEach(day=>{
      if(data[day][name]) delete data[day][name];
      if(Object.keys(data[day]).length === 0) delete data[day];
    });
    state.requestsCache[mk] = data;
    await storeSet('requests-' + mk, data);
  }

  async function saveDraftDay(mk, day, entry){
    const data = state.draftCache[mk] || {};
    data[day] = entry;
    state.draftCache[mk] = data;
    await storeSet('draft-' + mk, data);
  }

  async function finalizeMonth(mk){
    const draft = state.draftCache[mk] || {};
    state.finalCache[mk] = draft;
    await storeSet('final-' + mk, draft);
  }

  let memoryAuthFallback = {};
  async function getStaffAuth(){
    const a = await storeGet('staff-auth');
    return Object.assign({}, a || {}, memoryAuthFallback);
  }
  async function setStaffAuth(map){
    const ok = await storeSet('staff-auth', map);
    if(!ok){
      // storage backend is unavailable/unstable: keep working for this device/session
      memoryAuthFallback = Object.assign({}, memoryAuthFallback, map);
    }
    return ok;
  }

  /* ===================== Render root ===================== */
  async function render(){
    if(!state.user){
      clearSubscriptions();
      renderLogin();
      return;
    }
    app.innerHTML = '<div class="loading-wrap">読み込み中…</div>';
    const { year, month } = monthInfo(state.monthOffset);
    const mk = monthKey(year, month);
    await ensureMonthData(year, month);
    subscribeToMonth(year, month);
    if(state.user.role === 'staff'){
      renderStaff();
    } else {
      renderAdmin();
    }
  }

  /* ===================== Login screen ===================== */
  const MAX_LOGIN_ATTEMPTS = 5;
  const LOCKOUT_MS = 30000;
  function isLockedOut(key){
    const until = state.loginLockUntil[key];
    return !!(until && Date.now() < until);
  }
  function lockoutRemainingSeconds(key){
    const until = state.loginLockUntil[key] || 0;
    return Math.max(0, Math.ceil((until - Date.now()) / 1000));
  }
  function registerFailedAttempt(key){
    const count = (state.loginFailCounts[key] || 0) + 1;
    state.loginFailCounts[key] = count;
    if(count >= MAX_LOGIN_ATTEMPTS){
      state.loginLockUntil[key] = Date.now() + LOCKOUT_MS;
      state.loginFailCounts[key] = 0;
    }
  }
  function clearFailedAttempts(key){
    state.loginFailCounts[key] = 0;
    delete state.loginLockUntil[key];
  }

  function resetStaffLoginFlow(){
    state.loginStep = 'name';
    state.pendingStaffName = '';
    state.isNewStaff = false;
    state.loginError = '';
    state.showChangePassword = false;
  }

  function renderLogin(){
    const role = state.loginRole;
    let cardHtml = '';

    if(role === 'admin'){
      cardHtml = `

        <div class="pw-field-wrap">

          <button type="button" class="pw-toggle-btn" data-target="adminPassInput">${ICON_EYE}</button>
        </div>
        ${state.loginError ? `<div class="error-text">${escapeHtml(state.loginError)}</div>` : ''}
        <button id="adminLoginBtn" class="primary-btn">ログイン</button>
      `;
    } else if(state.loginStep === 'name'){
      cardHtml = `
        <label class="field-label">お名前</label>
        <input id="staffNameInput" class="text-input" type="text" placeholder="例）山田 太郎" maxlength="20">
        ${state.loginError ? `<div class="error-text">${escapeHtml(state.loginError)}</div>` : ''}
        <button id="staffNextBtn" class="primary-btn">次へ</button>
        <p class="hint-text">入力したお名前で申請が記録されます。<br>初めての方は次の画面でパスワードを設定します。</p>
      `;
    } else {
      const name = state.pendingStaffName;
      if(state.isNewStaff){
        cardHtml = `
          <p class="modal-sub">「${escapeHtml(name)}」さん、初めてのご利用ですね。<br>ログイン用のパスワードを設定してください。</p>
          <label class="field-label">新しいパスワード</label>
          <div class="pw-field-wrap">
            <input id="pw1" class="text-input" type="password" maxlength="30">
            <button type="button" class="pw-toggle-btn" data-target="pw1">${ICON_EYE}</button>
          </div>
          <label class="field-label">新しいパスワード（確認）</label>
          <div class="pw-field-wrap">
            <input id="pw2" class="text-input" type="password" maxlength="30">
            <button type="button" class="pw-toggle-btn" data-target="pw2">${ICON_EYE}</button>
          </div>
          ${state.loginError ? `<div class="error-text">${escapeHtml(state.loginError)}</div>` : ''}
          <button id="setPwBtn" class="primary-btn">設定してログイン</button>
          <button id="backToNameBtn" class="link-btn">← 名前を入力し直す</button>
        `;
      } else {
        cardHtml = `
          <p class="modal-sub">「${escapeHtml(name)}」さん、パスワードを入力してください。</p>
          <label class="field-label">パスワード</label>
          <div class="pw-field-wrap">
            <input id="pwInput" class="text-input" type="password" maxlength="30">
            <button type="button" class="pw-toggle-btn" data-target="pwInput">${ICON_EYE}</button>
          </div>
          ${state.loginError ? `<div class="error-text">${escapeHtml(state.loginError)}</div>` : ''}
          <button id="loginBtn" class="primary-btn">ログイン</button>
          <button id="toggleChangePwBtn" class="link-btn">パスワードを変更する</button>
          <button id="backToNameBtn" class="link-btn">← 名前を入力し直す</button>
          ${state.showChangePassword ? `
            <div style="margin-top:16px;padding-top:16px;border-top:1.5px solid var(--line);">
              <label class="field-label">現在のパスワード</label>
              <div class="pw-field-wrap">
                <input id="oldPw" class="text-input" type="password" maxlength="30">
                <button type="button" class="pw-toggle-btn" data-target="oldPw">${ICON_EYE}</button>
              </div>
              <label class="field-label">新しいパスワード</label>
              <div class="pw-field-wrap">
                <input id="newPw1" class="text-input" type="password" maxlength="30">
                <button type="button" class="pw-toggle-btn" data-target="newPw1">${ICON_EYE}</button>
              </div>
              <label class="field-label">新しいパスワード（確認）</label>
              <div class="pw-field-wrap">
                <input id="newPw2" class="text-input" type="password" maxlength="30">
                <button type="button" class="pw-toggle-btn" data-target="newPw2">${ICON_EYE}</button>
              </div>
              <button id="changePwBtn" class="primary-btn">変更してログイン</button>
            </div>
          ` : ''}
        `;
      }
    }

    app.innerHTML = `
      <div class="app-header">
        <div class="stamp-mark">福</div>
        <h1>福宝シフト</h1>
      </div>
      <div class="login-wrap">
        <div class="login-logo">福</div>
        <h2 class="login-title">福宝シフト</h2>
        <p class="login-sub">バイト・管理者ログイン</p>
        <div class="role-toggle">
          <button id="roleStaffBtn" class="${role==='staff'?'active':''}">バイト</button>
          <button id="roleAdminBtn" class="${role==='admin'?'active':''}">管理者</button>
        </div>
        <div class="login-card">${cardHtml}</div>
      </div>
    `;

    bindPasswordToggles();
    document.getElementById('roleStaffBtn').onclick = ()=>{ state.loginRole='staff'; state.loginError=''; resetStaffLoginFlow(); renderLogin(); };
    document.getElementById('roleAdminBtn').onclick = ()=>{ state.loginRole='admin'; state.loginError=''; renderLogin(); };

    if(role === 'admin'){
      const input = document.getElementById('adminPassInput');
      const submit = async ()=>{
        if(isLockedOut('__admin__')){
          state.loginError = `試行回数が多すぎます。${lockoutRemainingSeconds('__admin__')}秒後にもう一度お試しください`;
          renderLogin();
          return;
        }
        if(input.value !== '0315'){
          registerFailedAttempt('__admin__');
          if(isLockedOut('__admin__')){
            state.loginError = `パスコードが正しくありません。試行回数が多すぎるため${lockoutRemainingSeconds('__admin__')}秒間ロックされました`;
          } else {
            const remaining = MAX_LOGIN_ATTEMPTS - state.loginFailCounts['__admin__'];
            state.loginError = `パスコードが正しくありません（あと${remaining}回間違えるとロックされます）`;
          }
          renderLogin();
          return;
        }
        clearFailedAttempts('__admin__');
        state.user = { role:'admin', name:'管理者' };
        state.loginError=''; state.monthOffset=0;
        await render();
      };
      document.getElementById('adminLoginBtn').onclick = submit;
      input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
      input.focus();
    } else if(state.loginStep === 'name'){
      const input = document.getElementById('staffNameInput');
      const submit = async ()=>{
        const name = input.value.trim();
        if(!name){ state.loginError='お名前を入力してください'; renderLogin(); return; }
        const auth = await getStaffAuth();
        state.pendingStaffName = name;
        state.isNewStaff = !(name in auth);
        state.loginError = '';
        state.loginStep = 'password';
        renderLogin();
      };
      document.getElementById('staffNextBtn').onclick = submit;
      input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
      input.focus();
    } else {
      document.getElementById('backToNameBtn').onclick = ()=>{ resetStaffLoginFlow(); renderLogin(); };
      if(state.isNewStaff){
        const p1 = document.getElementById('pw1'), p2 = document.getElementById('pw2');
        const submit = async ()=>{
          if(!p1.value){ state.loginError='パスワードを入力してください'; renderLogin(); return; }
          if(p1.value !== p2.value){ state.loginError='パスワードが一致しません'; renderLogin(); return; }
          const setBtn = document.getElementById('setPwBtn');
          setBtn.disabled = true; setBtn.textContent = '保存中…';
          const auth = await getStaffAuth();
          auth[state.pendingStaffName] = p1.value;
          const ok = await setStaffAuth(auth);
          if(!ok){
            toast('⚠️ サーバー保存が不安定です。今回はこの端末のみで有効なパスワードとして進めます');
          }
          loginSuccessStaff();
        };
        document.getElementById('setPwBtn').onclick = submit;
        p1.focus();
      } else {
        const pwInput = document.getElementById('pwInput');
        const submit = async ()=>{
          const name = state.pendingStaffName;
          if(isLockedOut(name)){
            state.loginError = `試行回数が多すぎます。${lockoutRemainingSeconds(name)}秒後にもう一度お試しください`;
            renderLogin();
            return;
          }
          const auth = await getStaffAuth();
          if(auth[name] !== pwInput.value){
            registerFailedAttempt(name);
            if(isLockedOut(name)){
              state.loginError = `パスワードが正しくありません。試行回数が多すぎるため${lockoutRemainingSeconds(name)}秒間ロックされました`;
            } else {
              const remaining = MAX_LOGIN_ATTEMPTS - state.loginFailCounts[name];
              state.loginError = `パスワードが正しくありません（あと${remaining}回間違えるとロックされます）`;
            }
            renderLogin();
            return;
          }
          clearFailedAttempts(name);
          loginSuccessStaff();
        };
        document.getElementById('loginBtn').onclick = submit;
        pwInput.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
        pwInput.focus();
        document.getElementById('toggleChangePwBtn').onclick = ()=>{
          state.showChangePassword = !state.showChangePassword;
          state.loginError='';
          renderLogin();
        };
        if(state.showChangePassword){
          document.getElementById('changePwBtn').onclick = async ()=>{
            const name = state.pendingStaffName;
            if(isLockedOut(name)){
              state.loginError = `試行回数が多すぎます。${lockoutRemainingSeconds(name)}秒後にもう一度お試しください`;
              renderLogin();
              return;
            }
            const oldPw = document.getElementById('oldPw').value;
            const n1 = document.getElementById('newPw1').value;
            const n2 = document.getElementById('newPw2').value;
            const auth = await getStaffAuth();
            if(auth[name] !== oldPw){
              registerFailedAttempt(name);
              if(isLockedOut(name)){
                state.loginError = `現在のパスワードが正しくありません。試行回数が多すぎるため${lockoutRemainingSeconds(name)}秒間ロックされました`;
              } else {
                const remaining = MAX_LOGIN_ATTEMPTS - state.loginFailCounts[name];
                state.loginError = `現在のパスワードが正しくありません（あと${remaining}回間違えるとロックされます）`;
              }
              renderLogin();
              return;
            }
            if(!n1 || n1 !== n2){ state.loginError='新しいパスワードが一致しません'; renderLogin(); return; }
            clearFailedAttempts(name);
            const changeBtn = document.getElementById('changePwBtn');
            changeBtn.disabled = true; changeBtn.textContent = '保存中…';
            auth[name] = n1;
            const ok = await setStaffAuth(auth);
            if(!ok){
              toast('⚠️ サーバー保存が不安定です。今回はこの端末のみで有効なパスワードとして進めます');
            } else {
              toast('パスワードを変更しました');
            }
            loginSuccessStaff();
          };
        }
      }
    }
  }

  function loginSuccessStaff(){
    state.user = { role:'staff', name: state.pendingStaffName };
    resetStaffLoginFlow();
    state.monthOffset = 0;
    state.staffTab = 'request';
    render();
  }

  function goBack(){
    state.user = null;
    state.loginError = '';
    resetStaffLoginFlow();
    render();
  }

  function bindTodayCard(){
    const card = document.getElementById('todayCard');
    if(!card) return;
    const finalData = state.finalCache[card.dataset.mk];
    if(!finalData) return;
    card.onclick = ()=> openConfirmedDayModal(parseInt(card.dataset.day,10), card.dataset.mk, parseInt(card.dataset.month,10));

  /* ===================== STAFF VIEW ===================== */
  function renderStaff(){
    const { year, month, daysInMonth } = monthInfo(state.monthOffset);
    const mk = monthKey(year, month);
    const myRequests = state.requestsCache[mk] || {};
    const finalData = state.finalCache[mk];

    let cells = '';
    for(let d=1; d<=daysInMonth; d++){
      if(state.staffTab === 'request'){
        const mine = myRequests[d] && myRequests[d][state.user.name];
        const on = mine || {};
        let cls = 'day-cell';
        let mark = '';
        if(on.day && on.night){ cls += ' stamped'; mark = '☀️🌙'; }
        else if(on.day){ cls += ' stamped'; mark = '☀️昼'; }
        else if(on.night){ cls += ' stamped-night'; mark = '🌙夜'; }
        const hasComment = mine && mine.comment;
        cells += `<div class="${cls}" data-day="${d}">
            ${hasComment ? '<span class="comment-dot"></span>' : ''}
            <span class="num">${d}</span>
            ${mark ? `<span class="mark">${mark}</span>` : ''}
          </div>`;
      } else {
        const fEntry = finalData && finalData[d];
        const dayTeam = (fEntry && fEntry.day && fEntry.day.selected) || [];
        const nightTeam = (fEntry && fEntry.night && fEntry.night.selected) || [];
        const iAmDay = dayTeam.includes(state.user.name);
        const iAmNight = nightTeam.includes(state.user.name);
        let cls = 'day-cell';
        let mark = '';
        if(iAmDay && iAmNight){ cls += ' stamped'; mark='☀️🌙'; }
        else if(iAmDay){ cls += ' stamped'; mark='☀️昼'; }
        else if(iAmNight){ cls += ' stamped-night'; mark='🌙夜'; }
        else { cls += ' empty-day'; }
        cells += `<div class="${cls}" data-day="${d}">
            <span class="num">${d}</span>
            ${mark ? `<span class="mark">${mark}</span>` : ''}
          </div>`;
      }
    }

    const bodyForRequest = `
      <div class="section-label">日付をタップして希望を入力（${month}月・昼夜どちらも選べます）</div>
      <div class="cal-grid">${cells}</div>
      <div class="delete-all-wrap"><button class="danger-btn-small" id="deleteAllBtn">この月の申請をすべて削除</button></div>
      <div class="legend">
        <span><span class="dot" style="background:var(--red)"></span>昼 希望</span>
        <span><span class="dot" style="background:var(--night)"></span>夜 希望</span>
        <span>☀️🌙 昼夜 両方</span>
        <span><span class="dot" style="background:var(--gold)"></span>コメントあり</span>
      </div>
    `;
    const bodyForConfirmed = finalData ? `
      <div class="section-label">確定シフト（${month}月）・タップすると他の人の配置も見られます</div>
      <div class="cal-grid">${cells}</div>
      <div class="legend">
        <span><span class="dot" style="background:var(--red)"></span>あなた: 昼</span>
        <span><span class="dot" style="background:var(--night)"></span>あなた: 夜</span>
      </div>
    ` : `<div class="empty-msg">この月のシフトはまだ管理者が確定していません。<br>確定され次第、ここに表示されます。</div>`;

    app.innerHTML = `
      ${headerHtml()}
      <div class="main-scroll">
        ${monthBarHtml()}
        <div class="tab-bar">
          <button class="tab-btn ${state.staffTab==='request'?'active':''}" data-tab="request">申請</button>
          <button class="tab-btn ${state.staffTab==='confirmed'?'active':''}" data-tab="confirmed">確定</button>
        </div>
        ${state.staffTab === 'request' ? bodyForRequest : bodyForConfirmed}
      </div>
      <div id="modalRoot"></div>
    `;
    bindHeader();
    bindMonthBar(async ()=>{ await render(); });
    document.querySelectorAll('.tab-btn').forEach(btn=>{
      btn.onclick = ()=>{ state.staffTab = btn.dataset.tab; render(); };
    });
    if(state.staffTab === 'request'){
      document.querySelectorAll('.day-cell').forEach(cell=>{
        cell.onclick = ()=> openStaffDayModal(parseInt(cell.dataset.day,10), mk, month);
      });
      document.getElementById('deleteAllBtn').onclick = async ()=>{
        if(confirm(`${month}月のあなたの申請をすべて削除します。よろしいですか？`)){
          await deleteAllRequestsForUser(mk, state.user.name);
          toast('すべて削除しました');
          renderStaff();
        }
      };
    } else if(finalData){
      document.querySelectorAll('.day-cell').forEach(cell=>{
        cell.onclick = ()=> openConfirmedDayModal(parseInt(cell.dataset.day,10), mk, month);
      });
    }
  }

  function openStaffDayModal(day, mk, month){
    const data = state.requestsCache[mk] || {};
    const existing = (data[day] && data[day][state.user.name]) || null;
    let onDay = existing ? !!existing.day : false;
    let onNight = existing ? !!existing.night : false;
    let comment = existing ? (existing.comment || '') : '';

    const root = document.getElementById('modalRoot');
    function draw(){
      root.innerHTML = `
        <div class="overlay show">
          <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-title">${month}月${day}日の希望</div>
            <div class="modal-sub">昼・夜どちらも選べます。もう一度タップで取り消し。</div>
            <div class="shift-toggle-row">
              <button class="shift-toggle ${onDay?'sel-day':''}" id="btnDay"><span class="ico">☀️</span>昼</button>
              <button class="shift-toggle ${onNight?'sel-night':''}" id="btnNight"><span class="ico">🌙</span>夜</button>
            </div>
            <label class="field-label">コメント（任意）</label>
            <textarea class="text-input" id="commentInput" placeholder="伝えたいことがあれば入力してください">${escapeHtml(comment)}</textarea>
            <div class="modal-actions">
              <button class="ghost-btn" id="cancelBtn">閉じる</button>
              <button class="primary-btn" id="saveBtn">保存</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('btnDay').onclick = ()=>{ onDay = !onDay; draw(); };
      document.getElementById('btnNight').onclick = ()=>{ onNight = !onNight; draw(); };
      document.getElementById('cancelBtn').onclick = ()=>{ root.innerHTML=''; };
      document.getElementById('saveBtn').onclick = async ()=>{
        comment = document.getElementById('commentInput').value.trim();
        const entry = (onDay || onNight || comment) ? { day: onDay, night: onNight, comment } : null;
        await saveRequestDay(mk, day, state.user.name, entry);
        root.innerHTML='';
        toast('保存しました');
        renderStaff();
      };
    }
    draw();
  }

  function openConfirmedDayModal(day, mk, month){
    const finalData = state.finalCache[mk] || {};
    const fEntry = finalData[day] || {};
    const dayTeam = (fEntry.day && fEntry.day.selected) || [];
    const nightTeam = (fEntry.night && fEntry.night.selected) || [];
    const root = document.getElementById('modalRoot');
    function rosterHtml(list){
      if(!list.length) return `<div class="no-applicant">配置なし</div>`;
      return `<div class="roster-list">${list.map(n=>{
        const you = n === state.user.name;
        return `<div class="roster-row ${you?'you':''}">${escapeHtml(n)}${you?'（あなた）':''}</div>`;
      }).join('')}</div>`;
    }
    root.innerHTML = `
      <div class="overlay show">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">${month}月${day}日の確定シフト</div>
          <div class="shift-section day-sec">
            <div class="shift-section-title day-t">☀️ 昼</div>
            ${rosterHtml(dayTeam)}
          </div>
          <div class="shift-section night-sec">
            <div class="shift-section-title night-t">🌙 夜</div>
            ${rosterHtml(nightTeam)}
          </div>
          <button class="ghost-btn" id="closeBtn" style="width:100%">閉じる</button>
        </div>
      </div>
    `;
    document.getElementById('closeBtn').onclick = ()=>{ root.innerHTML=''; };
  }

  /* ===================== ADMIN VIEW ===================== */
  function renderAdmin(){
    const { year, month, daysInMonth } = monthInfo(state.monthOffset);
    const mk = monthKey(year, month);
    const requests = state.requestsCache[mk] || {};
    const draft = state.draftCache[mk] || {};
    const isFinalized = !!state.finalCache[mk];

    let cells = '';
    for(let d=1; d<=daysInMonth; d++){
      const dEntry = draft[d] || {};
      const dayReq = (dEntry.day && dEntry.day.required) || 0;
      const daySel = (dEntry.day && dEntry.day.selected && dEntry.day.selected.length) || 0;
      const nightReq = (dEntry.night && dEntry.night.required) || 0;
      const nightSel = (dEntry.night && dEntry.night.selected && dEntry.night.selected.length) || 0;
      const dayFull = dayReq > 0 && daySel >= dayReq;
      const nightFull = nightReq > 0 && nightSel >= nightReq;
      let cls = 'day-cell';
      if(daySel > 0 || nightSel > 0) cls += ' has-day';
      else cls += ' empty-day';
      if((dayReq>0 || nightReq>0) && dayFull && nightFull) cls += ' filled-full';
      cells += `<div class="${cls}" data-day="${d}">
          <span class="num">${d}</span>
          <span class="mini-badge"><span class="b-day">☀${daySel}/${dayReq}</span> <span class="b-night">🌙${nightSel}/${nightReq}</span></span>
        </div>`;
    }

    app.innerHTML = `
      ${headerHtml()}
      <div class="main-scroll">
        ${monthBarHtml()}
        <div class="month-settings-row"><button class="link-btn" id="monthSettingsBtn">⚙ 表示年月を設定</button></div>
        <div class="section-label">日付をタップして応募状況を確認・昼夜それぞれ選出（${year}年${month}月）</div>
        <div class="cal-grid">${cells}</div>
        <div class="legend">
          <span><span class="dot" style="background:var(--red-soft); box-shadow:0 0 0 1.5px var(--red) inset;"></span>選出あり</span>
          <span><span class="dot" style="background:var(--white); box-shadow:0 0 0 2px var(--gold) inset;"></span>昼夜とも充足</span>
        </div>
        ${isFinalized ? `<p class="status-line">この月は <b>確定済み</b> です。再確定すると最新の選出内容で上書きされます。</p>` : `<p class="status-line">まだ確定していません。選出後は下部の確定ボタンを押してください。</p>`}
      </div>
      <div class="finalize-bar">
        <button class="primary-btn" id="finalizeBtn">${month}月のシフトを確定する</button>
      </div>
      <div id="modalRoot"></div>
    `;
    bindHeader();
    bindMonthBar(async ()=>{ await render(); });
    document.querySelectorAll('.day-cell').forEach(cell=>{
      cell.onclick = ()=> openAdminDayModal(parseInt(cell.dataset.day,10), mk, month);
    });
    document.getElementById('monthSettingsBtn').onclick = openMonthSettingsModal;
    document.getElementById('finalizeBtn').onclick = ()=>{
      openFinalizeConfirmModal(mk, year, month, daysInMonth, draft, isFinalized);
    };
  }

  function openFinalizeConfirmModal(mk, year, month, daysInMonth, draft, isFinalized){
    let understaffed = 0;
    let totalSelected = 0;
    for(let d=1; d<=daysInMonth; d++){
      const e = draft[d] || {};
      const dayReq = (e.day && e.day.required) || 0;
      const daySel = (e.day && e.day.selected && e.day.selected.length) || 0;
      const nightReq = (e.night && e.night.required) || 0;
      const nightSel = (e.night && e.night.selected && e.night.selected.length) || 0;
      totalSelected += daySel + nightSel;
      if((dayReq > 0 && daySel < dayReq) || (nightReq > 0 && nightSel < nightReq)) understaffed++;
    }
    const root = document.getElementById('modalRoot');
    root.innerHTML = `
      <div class="overlay show">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">${month}月のシフトを確定しますか？</div>
          <div class="modal-sub">
            確定するとバイト全員が「確定」タブで閲覧できるようになります。${isFinalized ? '<br>すでに確定済みのため、最新の選出内容で上書きされます。' : ''}
          </div>
          <div class="req-count-label" style="margin-bottom:14px;">現在の選出人数合計：${totalSelected}人${understaffed > 0 ? `<br><span style="color:var(--red);font-weight:700;">必要人数に達していない日が${understaffed}日あります。未充足のままでも確定できます。</span>` : ''}</div>
          <div class="modal-actions">
            <button class="ghost-btn" id="cancelFinalizeBtn">キャンセル</button>
            <button class="primary-btn" id="confirmFinalizeBtn">確定する</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('cancelFinalizeBtn').onclick = ()=>{ root.innerHTML=''; };
    document.getElementById('confirmFinalizeBtn').onclick = async ()=>{
      await finalizeMonth(mk);
      root.innerHTML='';
      toast('確定しました');
      renderAdmin();
    };
  }

  function openAdminDayModal(day, mk, month){
    const requests = state.requestsCache[mk] || {};
    const dayApplicants = requests[day] || {};
    const dayNames = Object.keys(dayApplicants).filter(n => dayApplicants[n].day);
    const nightNames = Object.keys(dayApplicants).filter(n => dayApplicants[n].night);
    const draft = state.draftCache[mk] || {};
    const existingEntry = draft[day] || {};
    let dayRequired = (existingEntry.day && existingEntry.day.required) || 1;
    let nightRequired = (existingEntry.night && existingEntry.night.required) || 1;
    let daySelected = new Set((existingEntry.day && existingEntry.day.selected) || []);
    let nightSelected = new Set((existingEntry.night && existingEntry.night.selected) || []);

    const root = document.getElementById('modalRoot');
    function toggleSelect(set, name, required, label){
      if(set.has(name)){ set.delete(name); return; }
      if(required <= 0){
        toast(`${label}の必要人数が0人のため選択できません`);
        return;
      }
      if(set.size >= required){
        const oldest = set.values().next().value;
        set.delete(oldest);
        toast(`${label}の必要人数を超えたため「${oldest}」の選択を解除しました`);
      }
      set.add(name);
    }
    function trimSelection(set, required){
      if(set.size > required){
        const keep = Array.from(set).slice(0, Math.max(0, required));
        set.clear();
        keep.forEach(x=>set.add(x));
      }
    }
    function applicantRows(names, info, selectedSet, prefix){
      if(!names.length) return `<div class="no-applicant">この日の応募者はいません。</div>`;
      return names.map(name=>{
        const checked = selectedSet.has(name);
        const c = info[name].comment;
        return `
          <div class="applicant-row ${checked?'checked':''}" data-prefix="${prefix}" data-name="${escapeHtml(name)}">
            <div class="applicant-check">${checked?'✓':''}</div>
            <div class="applicant-info">
              <div class="applicant-name">${escapeHtml(name)}</div>
              ${c ? `<div class="applicant-comment">💬 ${escapeHtml(c)}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }
    function draw(){
      root.innerHTML = `
        <div class="overlay show">
          <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-title">${month}月${day}日の応募状況</div>

            <div class="shift-section day-sec">
              <div class="shift-section-title day-t">☀️ 昼　必要人数</div>
              <div class="req-count-row">
                <button class="count-btn" id="dayMinus">−</button>
                <div class="req-count-num">${dayRequired}</div>
                <button class="count-btn" id="dayPlus">＋</button>
              </div>
              <div class="req-count-label">${daySelected.size}/${dayRequired} 人選出中・応募者</div>
              ${applicantRows(dayNames, dayApplicants, daySelected, 'day')}
            </div>

            <div class="shift-section night-sec">
              <div class="shift-section-title night-t">🌙 夜　必要人数</div>
              <div class="req-count-row">
                <button class="count-btn" id="nightMinus">−</button>
                <div class="req-count-num">${nightRequired}</div>
                <button class="count-btn" id="nightPlus">＋</button>
              </div>
              <div class="req-count-label">${nightSelected.size}/${nightRequired} 人選出中・応募者</div>
              ${applicantRows(nightNames, dayApplicants, nightSelected, 'night')}
            </div>

            <div class="modal-actions">
              <button class="ghost-btn" id="cancelBtn">閉じる</button>
              <button class="primary-btn" id="saveBtn">この日を保存</button>
            </div>
          </div>
        </div>
      `;
      document.getElementById('dayMinus').onclick = ()=>{ dayRequired = Math.max(0, dayRequired-1); trimSelection(daySelected, dayRequired); draw(); };
      document.getElementById('dayPlus').onclick = ()=>{ dayRequired = dayRequired+1; draw(); };
      document.getElementById('nightMinus').onclick = ()=>{ nightRequired = Math.max(0, nightRequired-1); trimSelection(nightSelected, nightRequired); draw(); };
      document.getElementById('nightPlus').onclick = ()=>{ nightRequired = nightRequired+1; draw(); };
      document.getElementById('cancelBtn').onclick = ()=>{ root.innerHTML=''; };
      document.querySelectorAll('.applicant-row').forEach(row=>{
        row.onclick = ()=>{
          const n = row.dataset.name;
          if(row.dataset.prefix === 'day'){ toggleSelect(daySelected, n, dayRequired, '昼'); }
          else { toggleSelect(nightSelected, n, nightRequired, '夜'); }
          draw();
        };
      });
      document.getElementById('saveBtn').onclick = async ()=>{
        await saveDraftDay(mk, day, {
          day: { required: dayRequired, selected: Array.from(daySelected) },
          night: { required: nightRequired, selected: Array.from(nightSelected) }
        });
        root.innerHTML='';
        toast('この日を保存しました');
        renderAdmin();
      };
    }
    draw();
  }

  function openMonthSettingsModal(){
    const root = document.getElementById('modalRoot');
    const isAuto = !state.baseMonthOverride;
    const now = new Date();
    const curYear = state.baseMonthOverride ? state.baseMonthOverride.year : now.getFullYear();
    const curMonth = state.baseMonthOverride ? state.baseMonthOverride.month : now.getMonth()+1;
    const yearOptions = [];
    for(let y = now.getFullYear()-1; y <= now.getFullYear()+3; y++){
      yearOptions.push(`<option value="${y}" ${y===curYear?'selected':''}>${y}年</option>`);
    }
    const monthOptions = [];
    for(let m=1; m<=12; m++){
      monthOptions.push(`<option value="${m}" ${m===curMonth?'selected':''}>${m}月</option>`);
    }
    root.innerHTML = `
      <div class="overlay show">
        <div class="modal-sheet">
          <div class="modal-handle"></div>
          <div class="modal-title">表示年月の設定</div>
          <div class="modal-sub">${isAuto ? '現在は本日の日付から自動的に「当月」を計算しています。' : `現在は手動設定中です（当月＝${state.baseMonthOverride.year}年${state.baseMonthOverride.month}月）。`}</div>
          <label class="field-label">「当月」として扱う年</label>
          <select id="baseYearSelect" class="text-input">${yearOptions.join('')}</select>
          <label class="field-label">「当月」として扱う月</label>
          <select id="baseMonthSelect" class="text-input">${monthOptions.join('')}</select>
          <div class="modal-actions">
            <button class="ghost-btn" id="autoBtn">自動に戻す</button>
            <button class="primary-btn" id="applyBtn">この年月を適用</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('applyBtn').onclick = async ()=>{
      const y = parseInt(document.getElementById('baseYearSelect').value, 10);
      const m = parseInt(document.getElementById('baseMonthSelect').value, 10);
      state.baseMonthOverride = { year:y, month:m };
      await storeSet('settings-baseMonth', state.baseMonthOverride);
      root.innerHTML='';
      toast('表示年月を設定しました');
      state.monthOffset = 0;
      render();
    };
    document.getElementById('autoBtn').onclick = async ()=>{
      state.baseMonthOverride = null;
      await storeSet('settings-baseMonth', null);
      root.innerHTML='';
      toast('自動計算に戻しました');
      state.monthOffset = 0;
      render();
    };
  }

  /* ===================== Init ===================== */
  async function init(){
    const settings = await storeGet('settings-baseMonth');
    state.baseMonthOverride = settings || null;
    render();
  }
  init();
})();
</script>
</body>
</html>
